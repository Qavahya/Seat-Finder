<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Seat</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    
<img src="images/flower-top.png" class="flower-top" alt="">
<img src="images/flower-bottom.png" class="flower-bottom" alt="">
